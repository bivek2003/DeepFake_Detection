services:
  - type: web
    name: deepfake-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: DEVICE
        value: cpu
      - key: DATABASE_URL
        fromDatabase:
          name: deepfake-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: CELERY_BROKER_URL
        value: ""
      - key: CELERY_RESULT_BACKEND
        value: ""
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: ASSETS_DIR
        value: /app/assets
      - key: MODEL_WEIGHTS_PATH
        value: /app/weights
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: "https://*.vercel.app,http://localhost:3000,http://localhost:5173"
      - key: LOG_LEVEL
        value: INFO
      - key: AUTH_ENABLED
        value: "false"
    healthCheckPath: /api/v1/healthz

databases:
  - name: deepfake-db
    plan: free
    databaseName: deepfake_detection
    user: deepfake
